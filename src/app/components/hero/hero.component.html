<section id="hero" class="hero">
  <div class="hero-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <div class="greeting">
          <span class="mono">// Bonjour, je suis</span>
        </div>
        <h1 class="hero-name">
          <span class="first">Jordan</span><br>
          <span class="last">Toutsop</span>
        </h1>
        <div class="hero-title">
          <span class="static">— </span>
          <span class="typed">{{ displayText }}</span>
          <span class="cursor">|</span>

        <div class="stats-grid">
          <div class="stat">
            <span class="stat-num">5+</span>
            <span class="stat-label">Années d'exp.</span>

          <div class="stat">

  <div class="scroll-indicator" (click)="scrollTo('#about')">
    <span class="mono">scroll</span>
    <div class="scroll-line"></div>
